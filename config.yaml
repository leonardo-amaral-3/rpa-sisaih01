sisaih:
  executable_path: 'C:/DATASUS/SISAIH01/SISAIH01.EXE'
  window_title_regex: '.*SISAIH.*'

timeouts:
  app_start: 30
  import_file: 600
  consistir: 1800
  apurar: 1800
  exportar: 300

export:
  dir: 'C:\DATASUS\SISAIH01\exports'

paths:
  local_input_dir: 'C:\SIHD_CONVERTER\input'

# Valores de infra vêm de env vars em produção (injetadas pelo CDK)
# Para dev local, usar: python worker.py --config config.local.yaml
aws:
  region: 'us-east-1'

api:
  timeout: 15
  max_retries: 3

worker:
  max_empty_polls: 3
  shutdown_delay: 120
  visibility_heartbeat: 300
  visibility_extension: 900
