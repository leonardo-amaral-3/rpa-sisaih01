AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  SIHD Converter - Auto-scaler.
  Lambda que verifica filas SQS e lança instâncias EC2 via Launch Template.

Parameters:
  QueueUrlDev:
    Type: String
    Description: URL da fila SQS do ambiente dev
  QueueUrlProd:
    Type: String
    Description: URL da fila SQS do ambiente prod
  LaunchTemplateDev:
    Type: String
    Default: sihd-converter-dev
    Description: Nome do Launch Template do ambiente dev
  LaunchTemplateProd:
    Type: String
    Default: sihd-converter-prod
    Description: Nome do Launch Template do ambiente prod
  MaxInstances:
    Type: Number
    Default: 3
    Description: Máximo de instâncias simultâneas por ambiente
  Ec2RoleArn:
    Type: String
    Description: ARN da IAM Role da EC2 (necessário para iam:PassRole)

Resources:
  ScalerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: sihd-converter-scaler
      Handler: app.handler
      Runtime: python3.12
      CodeUri: scaler/
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          QUEUE_URL_DEV: !Ref QueueUrlDev
          QUEUE_URL_PROD: !Ref QueueUrlProd
          LAUNCH_TEMPLATE_DEV: !Ref LaunchTemplateDev
          LAUNCH_TEMPLATE_PROD: !Ref LaunchTemplateProd
          MAX_INSTANCES: !Ref MaxInstances
      Policies:
        - Statement:
            - Sid: SQSReadAttributes
              Effect: Allow
              Action: sqs:GetQueueAttributes
              Resource: !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:sihd-converter-queue-*'
            - Sid: EC2LaunchAndDescribe
              Effect: Allow
              Action:
                - ec2:DescribeInstances
                - ec2:RunInstances
                - ec2:CreateTags
              Resource: '*'
            - Sid: PassRoleToEC2
              Effect: Allow
              Action: iam:PassRole
              Resource: !Ref Ec2RoleArn
      Events:
        ScheduleDev:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: Verifica fila SQS dev e escala instâncias
            Input: '{"environment": "dev"}'
        ScheduleProd:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: Verifica fila SQS prod e escala instâncias
            Input: '{"environment": "prod"}'

Outputs:
  ScalerFunctionArn:
    Description: ARN da Lambda escaladora
    Value: !GetAtt ScalerFunction.Arn
  ScalerFunctionName:
    Description: Nome da Lambda escaladora
    Value: !Ref ScalerFunction
